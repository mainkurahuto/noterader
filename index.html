<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>TJA Notes Radar - Limit Break</title>
    <style>
        body { background: #111; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        #drop-zone { width: 500px; height: 100px; border: 3px dashed #444; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; transition: 0.3s; cursor: pointer; border-radius: 15px; }
        #drop-zone:hover { border-color: #ff00ff; background: #222; }
        
        canvas { background: #000; box-shadow: 0 0 30px rgba(0,0,0,0.7); border-radius: 10px; }
        
        .controls { margin-top: 15px; text-align: center; }
        .switch-container { margin-bottom: 15px; background: #222; padding: 10px 20px; border-radius: 30px; border: 1px solid #333; }
        .switch-container label { cursor: pointer; font-weight: bold; color: #ddd; display: flex; align-items: center; gap: 10px; }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; accent-color: #ff00ff; }

        #song-title { font-size: 26px; font-weight: bold; }
        #radar-summary { font-size: 18px; color: #ff3333; margin-top: 5px; height: 24px; }
        #file-input { display: none; }
        .status { color: #666; font-size: 11px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="switch-container">
        <label>
            <input type="checkbox" id="limit-toggle"> 
            <span>リミッター解除 (上限200を突破)</span>
        </label>
    </div>

    <div id="drop-zone">TJAファイルをドロップ または クリックして選択</div>
    <input type="file" id="file-input" accept=".tja">
    
    <canvas id="radarCanvas" width="700" height="550"></canvas>
    
    <div class="controls">
        <div id="song-title">---</div>
        <div id="radar-summary"></div>
        <div class="status">Logic: NPS12=200 / Tech-Switching / Continuous-Stamina / Growth-0.98</div>
    </div>

<script>
    const canvas = document.getElementById('radarCanvas');
    const ctx = canvas.getContext('2d');
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const limitToggle = document.getElementById('limit-toggle');

    let currentTJAData = null; // 再計算用に保持

    const COLORS = [
        { name: "NOTES", color: "#ff69b4" },
        { name: "PEAK", color: "#ffa500" },
        { name: "TECH", color: "#00ff00" },
        { name: "SOF-LAN", color: "#00ffff" },
        { name: "HUKUGOU", color: "#9370db" },
        { name: "STAMINA", color: "#ff0000" }
    ];

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFiles(e.target.files);
    limitToggle.onchange = () => { if(currentTJAData) parseTJA(currentTJAData); };
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = "#ff00ff"; };
    dropZone.ondragleave = () => dropZone.style.borderColor = "#444";
    dropZone.ondrop = (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); };

    function handleFiles(files) {
        if (!files.length) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            currentTJAData = e.target.result;
            parseTJA(currentTJAData);
        };
        reader.readAsText(files[0], 'Shift-JIS');
    }

    function parseTJA(text) {
        const lines = text.split(/\r?\n/);
        let title = "Unknown Title", baseBpm = 120, currentBpm = 120;
        let bpms = [], scrolls = [1.0], notes = [];
        let currentTimeMs = 0, isReading = false, currentScroll = 1.0, measureCount = 4.0;

        lines.forEach(line => {
            line = line.split("//")[0].trim();
            if (line.startsWith("TITLE:")) title = line.replace("TITLE:", "").trim();
            if (line.startsWith("BPM:")) { baseBpm = currentBpm = parseFloat(line.replace("BPM:", "")); bpms.push(currentBpm); }
            if (line.startsWith("#START")) { isReading = true; return; }
            if (line.startsWith("#END")) isReading = false;
            if (isReading) {
                if (line.startsWith("#BPMCHANGE")) { currentBpm = parseFloat(line.replace("#BPMCHANGE", "")); bpms.push(currentBpm); }
                else if (line.startsWith("#SCROLL")) { currentScroll = Math.abs(parseFloat(line.replace("#SCROLL", ""))); scrolls.push(currentScroll); }
                else if (line.startsWith("#MEASURE")) { let m = line.replace("#MEASURE", "").trim().split("/"); measureCount = parseFloat(m[0]) / parseFloat(m[1]) * 4; }
                else if (!line.startsWith("#")) {
                    const measureNotes = line.replace(/,/g, "");
                    const hasComma = line.includes(",");
                    const noteCount = measureNotes.length;
                    if (noteCount > 0) {
                        const msPerNote = (60000 / currentBpm * measureCount) / noteCount;
                        for (let char of measureNotes) {
                            if (/[1-4]/.test(char)) notes.push({ time: currentTimeMs, type: parseInt(char) });
                            currentTimeMs += msPerNote;
                        }
                    } else if (hasComma) { currentTimeMs += (60000 / currentBpm * measureCount); }
                }
            }
        });

        if (notes.length === 0) return;

        const totalSeconds = Math.max(1.0, (notes[notes.length-1].time - notes[0].time) / 1000.0);
        const isLimitOff = limitToggle.checked;

        // --- C#ロジックの完全移植 ---
        const applyGrowth = (val) => {
            if (val <= 0) return 0;
            let res = Math.pow(val / 100.0, 0.98) * 100.0;
            return isLimitOff ? res : Math.min(200, res);
        };

        const applyStiff = (val) => {
            let res = Math.pow(val / 100.0, 0.98) * 100.0;
            if (res > 150) res = 150 + (res - 150) * 0.25;
            return isLimitOff ? res : Math.min(200, res);
        };

        // 1. NOTES
        const resNotes = applyGrowth((notes.length / totalSeconds / 12.0) * 200.0);

        // 2. PEAK
        let maxPeakNps = 0;
        for (let t = notes[0].time; t < notes[notes.length-1].time - 5000; t += 500) {
            let count = notes.filter(n => n.time >= t && n.time < t + 5000).length;
            maxPeakNps = Math.max(maxPeakNps, count / 5.0);
        }
        const resPeak = applyGrowth(maxPeakNps * (170.0 / 20.0));

        // 3. SOFLAN
        if (bpms.length === 0) bpms = [currentBpm];
        const bpmRatio = Math.max(...bpms) / Math.max(1, Math.min(...bpms));
        const resSoflan = applyGrowth((bpmRatio - 1.0) * 35.0 + (Math.max(...scrolls) * 12.0));

        // ループ解析
        let count12Plus = 0, maxStream = 0, currentStream = 0, continuousCount = 0, techChanges = 0, staminaPoints = 0, prevInterval = -1;
        for (let i = 0; i < notes.length; i++) {
            let interval = (i > 0) ? notes[i].time - notes[i-1].time : -1;
            if (interval < 180 && interval > 5) {
                currentStream++; continuousCount++;
                if (prevInterval > 5 && Math.abs(interval - prevInterval) > (prevInterval * 0.1)) {
                    techChanges += 1.0;
                    let ratio = Math.max(interval, prevInterval) / Math.min(interval, prevInterval);
                    if (Math.abs(ratio - 1.5) < 0.1) techChanges += 0.5;
                }
                staminaPoints += Math.max(0.5, 100.0 / interval) * (1.0 + (continuousCount / 15.0));
                prevInterval = interval;
            } else {
                if (currentStream >= 12) count12Plus++;
                maxStream = Math.max(maxStream, currentStream);
                currentStream = 0; continuousCount = 0; prevInterval = -1;
            }
        }

        const resHukugou = applyStiff((maxStream * 0.5) + (count12Plus * 4.75));
        const resTech = applyGrowth((techChanges / (totalSeconds + 15)) * 120.0); // Web用に少し係数調整
        const resStamina = applyStiff((staminaPoints / totalSeconds) * 3.5);

        drawRadar(title, [resNotes, resPeak, resTech, resSoflan, resHukugou, resStamina], Math.min(...bpms), Math.max(...bpms));
    }

    function drawRadar(title, values, minBpm, maxBpm) {
        document.getElementById('song-title').innerText = title;
        const cX = 350, cY = 260, r = 180;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. 100基準背景
        ctx.beginPath();
        ctx.fillStyle = "rgba(40, 40, 40, 0.6)";
        for(let i=0; i<6; i++) {
            let a = (i * 60 - 90) * Math.PI / 180;
            let x = cX + r * 0.5 * Math.cos(a), y = cY + r * 0.5 * Math.sin(a);
            if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
        ctx.lineWidth = 1; ctx.stroke();

        // 2. 本体
        const maxVal = Math.max(...values);
        const dominantIndex = values.indexOf(maxVal);
        const dominantColor = COLORS[dominantIndex].color;

        ctx.beginPath();
        for(let i=0; i<6; i++) {
            let v = values[i] / 200.0;
            let a = (i * 60 - 90) * Math.PI / 180;
            let x = cX + r * v * Math.cos(a), y = cY + r * v * Math.sin(a);
            if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fillStyle = dominantColor + "aa"; ctx.fill();
        ctx.strokeStyle = dominantColor; ctx.lineWidth = 4; ctx.stroke();

        // 3. ラベル
        ctx.font = "bold 14px sans-serif";
        for(let i=0; i<6; i++) {
            let a = (i * 60 - 90) * Math.PI / 180;
            let lx = cX + (r + 45) * Math.cos(a), ly = cY + (r * 0.8 + 35) * Math.sin(a);
            ctx.fillStyle = COLORS[i].color;
            ctx.fillRect(lx - 55, ly - 10, 10, 10);
            ctx.fillStyle = "#fff"; ctx.textAlign = "left";
            ctx.fillText(`${COLORS[i].name} ${values[i].toFixed(0)}`, lx - 40, ly);
        }

        const radarSum = (values.reduce((a,b)=>a+b,0) / 6).toFixed(0);
        document.getElementById('radar-summary').innerText = `RADAR SCORE: ${radarSum}`;
        ctx.textAlign = "center"; ctx.fillStyle = "#fff"; ctx.font = "16px sans-serif";
        ctx.fillText(`BPM: ${minBpm === maxBpm ? minBpm : minBpm + "-" + maxBpm}`, cX, cY - r - 40);
        ctx.fillStyle = "#fff"; ctx.fillRect(cX-1, cY-1, 2, 2);
    }
    drawRadar("TJAをドロップしてください", [0,0,0,0,0,0], 0, 0);
</script>
</body>
</html>
