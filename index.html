<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>TJA Notes Radar - Advanced Analyzer</title>
    <style>
        body { background: #111; color: #fff; font-family: 'Segoe UI', Meiryo, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        #drop-zone { width: 600px; height: 100px; border: 3px dashed #444; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; transition: 0.3s; cursor: pointer; border-radius: 15px; background: #1a1a1a; }
        #drop-zone:hover { border-color: #ff00ff; background: #222; }
        canvas { background: #000; box-shadow: 0 0 40px rgba(0,0,0,0.8); border-radius: 10px; }
        .switch-container { margin-bottom: 15px; background: #222; padding: 10px 25px; border-radius: 30px; border: 1px solid #333; display: flex; align-items: center; gap: 20px; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #ff00ff; }
        #song-title { font-size: 28px; font-weight: bold; color: #efefef; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        #radar-summary { font-size: 20px; color: #ff3333; margin-top: 5px; font-weight: bold; }
        #file-input { display: none; }
        .status { color: #555; font-size: 11px; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="switch-container">
        <label style="cursor:pointer; display:flex; align-items:center; gap:8px;">
            <input type="checkbox" id="limit-toggle"> 
            <span>リミッター解除</span>
        </label>
    </div>

    <div id="drop-zone">TJAファイルをドロップ または クリック</div>
    <input type="file" id="file-input" accept=".tja">
    
    <canvas id="radarCanvas" width="800" height="600"></canvas>
    
    <div style="text-align:center; margin-top:15px;">
        <div id="song-title">---</div>
        <div id="radar-summary"></div>
        <div class="status">Custom Logic: Tech-Ratio / Continuous-Stamina (Factor 4) / NPS12-200</div>
    </div>

<script>
    const canvas = document.getElementById('radarCanvas');
    const ctx = canvas.getContext('2d');
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const limitToggle = document.getElementById('limit-toggle');

    let currentTJAData = null;

    const COLORS = [
        { name: "NOTES", color: "#ff69b4" }, // HotPink
        { name: "PEAK", color: "#ffa500" },  // Orange
        { name: "TECH", color: "#00ff00" },  // Lime
        { name: "SOF-LAN", color: "#00ffff" }, // Cyan
        { name: "HUKUGOU", color: "#9370db" }, // MediumPurple
        { name: "STAMINA", color: "#ff0000" }  // Red
    ];

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFiles(e.target.files);
    limitToggle.onchange = () => { if(currentTJAData) calculateRadar(currentTJAData); };
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = "#ff00ff"; };
    dropZone.ondragleave = () => dropZone.style.borderColor = "#444";
    dropZone.ondrop = (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); };

    function handleFiles(files) {
        if (!files.length) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            currentTJAData = e.target.result;
            calculateRadar(currentTJAData);
        };
        reader.readAsText(files[0], 'Shift-JIS');
    }

    function calculateRadar(text) {
        const lines = text.split(/\r?\n/);
        let title = "Unknown Title", currentBpm = 120;
        let bpms = [], scrolls = [], notes = [];
        let currentTimeMs = 0, isReading = false, currentScroll = 1.0, measure = 4.0;

        // ギミック対策：ノーツがない場所のBPM/SCROLLを無視するためのバッファ
        lines.forEach(line => {
            line = line.split("//")[0].trim();
            if (!line) return;
            if (line.startsWith("TITLE:")) title = line.replace("TITLE:", "").trim();
            if (line.startsWith("BPM:")) { currentBpm = parseFloat(line.replace("BPM:", "")); bpms.push(currentBpm); }
            if (line.startsWith("#START")) { isReading = true; return; }
            if (line.startsWith("#END")) isReading = false;
            if (isReading) {
                if (line.startsWith("#BPMCHANGE")) { currentBpm = parseFloat(line.replace("#BPMCHANGE", "")); bpms.push(currentBpm); }
                else if (line.startsWith("#SCROLL")) { currentScroll = Math.abs(parseFloat(line.replace("#SCROLL", ""))); }
                else if (line.startsWith("#MEASURE")) { 
                    let m = line.replace("#MEASURE", "").trim().split("/");
                    measure = (parseFloat(m[0]) / parseFloat(m[1])) * 4;
                }
                else if (!line.startsWith("#")) {
                    const measureNotes = line.replace(/,/g, "");
                    const noteCount = measureNotes.length;
                    if (noteCount > 0) {
                        const msPerNote = (60000 / currentBpm * measure) / noteCount;
                        for (let char of measureNotes) {
                            if (/[1-4]/.test(char)) {
                                notes.push({ time: currentTimeMs, type: parseInt(char), bpm: currentBpm, scroll: currentScroll });
                                // ギミック対策：ノーツがある瞬間のBPMとSCROLLのみを評価対象リストに入れる
                                bpms.push(currentBpm);
                                scrolls.push(currentScroll);
                            }
                            currentTimeMs += msPerNote;
                        }
                    } else if (line.includes(",")) {
                        currentTimeMs += (60000 / currentBpm * measure);
                    }
                }
            }
        });

        if (notes.length === 0) return;

        const firstMs = notes[0].time;
        const lastMs = notes[notes.length - 1].time;
        const totalSeconds = Math.max(1.0, (lastMs - firstMs) / 1000.0);
        const isLimitOff = limitToggle.checked;

        // --- 成長曲線系 ---
        const applyGrowth = (val) => {
            if (val <= 0) return 0;
            let res = Math.pow(val / 100.0, 0.98) * 100.0;
            return isLimitOff ? res : Math.min(200, res);
        };
        const applyStiff = (val) => {
            let res = applyGrowth(val);
            if (res <= 150) return res;
            let stiffened = 150 + (res - 150) * 0.25;
            return isLimitOff ? stiffened : Math.min(200, stiffened);
        };

        // 1. NOTES (NPS 12 = 200)
        const resNotes = applyGrowth((notes.length / totalSeconds / 12.0) * 200.0);

        // 2. PEAK (5秒窓)
        let maxPeakNps = 0;
        for (let t = firstMs; t < lastMs - 5000; t += 500) {
            let count = notes.filter(n => n.time >= t && n.time < t + 5000).length;
            maxPeakNps = Math.max(maxPeakNps, count / 5.0);
        }
        const resPeak = applyGrowth(maxPeakNps * (170.0 / 20.0));

        // 3. SOFLAN (ギミック対策済み)
        const maxBpm = Math.max(...bpms);
        const minBpm = Math.min(...bpms);
        const bpmRatio = maxBpm / Math.max(1.0, minBpm);
        const maxScroll = scrolls.length > 0 ? Math.max(...scrolls) : 1.0;
        const resSoflan = applyGrowth((bpmRatio - 1.0) * 35.0 + (maxScroll * 12.0));

        // --- ループ解析 (TECH, STAMINA, HUKUGOU) ---
        let count12Plus = 0, maxStream = 0, currentStream = 0;
        let continuousCount = 0, techChanges = 0, staminaPoints = 0, prevInterval = -1;

        for (let i = 0; i < notes.length; i++) {
            let interval = (i > 0) ? notes[i].time - notes[i-1].time : -1;
            if (interval < 180 && interval > 5) {
                currentStream++;
                continuousCount++;
                
                // TECH: リズム切り替え (C#ロジック完全準拠)
                if (prevInterval > 5) {
                    let ratio = Math.max(interval, prevInterval) / Math.min(interval, prevInterval);
                    if (ratio > 1.1) {
                        if (Math.abs(ratio - 2.0) < 0.1 || Math.abs(ratio - 4.0) < 0.1) techChanges += 0.1;
                        else if (Math.abs(ratio - 1.5) < 0.1 || Math.abs(ratio - 0.75) < 0.1) techChanges += 1.2;
                        else if (Math.abs(ratio - 1.33) < 0.05 || Math.abs(ratio - 0.66) < 0.05) techChanges += 2.5;
                        else techChanges += 5.0;
                    }
                }
                // STAMINA: 連続性(1/4.0)×速度
                let speedWeight = Math.max(0.5, 100.0 / interval);
                let lengthWeight = 1.0 + (continuousCount / 4.0);
                staminaPoints += speedWeight * lengthWeight;

                prevInterval = interval;
            } else {
                if (currentStream >= 12) count12Plus++;
                maxStream = Math.max(maxStream, currentStream);
                currentStream = 0; continuousCount = 0; prevInterval = -1;
            }
        }

        const resHukugou = applyStiff((maxStream * 2) + (count12Plus * 1));
        const resTech = applyGrowth((techChanges / (totalSeconds + 15)) * 90.0);
        const resStamina = applyStiff((staminaPoints / totalSeconds) * 3.5);

        drawRadar(title, [resNotes, resPeak, resTech, resSoflan, resHukugou, resStamina], minBpm, maxBpm);
    }

    function drawRadar(title, values, minBpm, maxBpm) {
        document.getElementById('song-title').innerText = title;
        const cX = 400, cY = 280, r = 200;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. 背景の黒い六角形 (100基準)
        ctx.beginPath();
        ctx.fillStyle = "rgba(30, 30, 30, 0.7)";
        for(let i=0; i<6; i++) {
            let a = (i * 60 - 90) * Math.PI / 180;
            let x = cX + r * 0.5 * Math.cos(a), y = cY + r * 0.5 * Math.sin(a);
            if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = "rgba(255, 255, 255, 0.2)";
        ctx.setLineDash([5, 5]);
        ctx.stroke();
        ctx.setLineDash([]);

        // 2. 本体ポリゴン
        const maxVal = Math.max(...values);
        const dominantIndex = values.indexOf(maxVal);
        const fillCol = COLORS[dominantIndex].color;

        ctx.beginPath();
        for(let i=0; i<6; i++) {
            let v = values[i] / 200.0;
            let a = (i * 60 - 90) * Math.PI / 180;
            let x = cX + r * v * Math.cos(a), y = cY + r * v * Math.sin(a);
            if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fillStyle = fillCol + "99"; 
        ctx.fill();
        ctx.strokeStyle = fillCol;
        ctx.lineWidth = 4;
        ctx.stroke();

        // 3. ラベルと中心点
        ctx.font = "bold 15px 'Segoe UI'";
        for(let i=0; i<6; i++) {
            let a = (i * 60 - 90) * Math.PI / 180;
            let lx = cX + (r + 45) * Math.cos(a), ly = cY + (r * 0.8 + 40) * Math.sin(a);
            ctx.fillStyle = COLORS[i].color;
            ctx.fillRect(lx - 60, ly - 12, 12, 12);
            ctx.fillStyle = "#fff";
            ctx.textAlign = "left";
            ctx.fillText(`${COLORS[i].name} ${values[i].toFixed(1)}`, lx - 42, ly);
        }

        // 中心点
        ctx.fillStyle = "#fff"; ctx.fillRect(cX-2, cY-2, 4, 4);

        // 下部情報
        const radarSum = (values.reduce((a,b)=>a+b,0) / 6).toFixed(0);
        document.getElementById('radar-summary').innerText = `TOTAL RADAR: ${radarSum}`;
        ctx.textAlign = "center"; ctx.fillStyle = "#aaa"; ctx.font = "16px sans-serif";
        ctx.fillText(`BPM: ${minBpm === maxBpm ? minBpm : minBpm + "-" + maxBpm}`, cX, cY - r - 50);
    }

    drawRadar("TJAを待機中...", [0,0,0,0,0,0], 0, 0);
</script>
</body>
</html>
